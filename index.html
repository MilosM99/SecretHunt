<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Secret Hunt</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;

      background: #000 url('background.png') center/cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(0, 20, 8, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 255, 100, 0.25);
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 255, 100, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      letter-spacing: 1px;
      color: #7CFFB2;
      text-shadow: 0 0 12px rgba(124, 255, 178, 0.3);
    }

    .subtitle {
      font-size: 15px;
      opacity: 0.8;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      font-size: 20px;
      letter-spacing: 6px;
      text-align: center;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(0, 255, 100, 0.3);
      border-radius: 12px;
      color: #7CFFB2;
      font-family: "Courier New", monospace;
      outline: none;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }

    input[type="text"]::placeholder {
      color: rgba(124, 255, 178, 0.35);
      letter-spacing: 2px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    input[type="text"]:focus {
      border-color: rgba(0, 255, 100, 0.7);
      background: rgba(0, 0, 0, 0.55);
      box-shadow: 0 0 20px rgba(0, 255, 100, 0.2);
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #7CFFB2 0%, #4ED88A 100%);
      color: #001a08;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:hover {
      box-shadow: 0 8px 24px rgba(0, 255, 100, 0.35);
    }

    button:active {
      transform: scale(0.98);
    }

    .secondary-btn {
      background: transparent;
      color: #7CFFB2;
      border: 2px solid rgba(124, 255, 178, 0.5);
      margin-top: 12px;
      text-decoration: none;
      display: inline-block;
    }

    .hidden {
      display: none !important;
    }

    .result-icon {
      font-size: 64px;
      margin-bottom: 16px;
      line-height: 1;
    }

    .success h1 {
      color: #7CFFB2;
    }

    .error h1 {
      color: #FF8A8A;
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 380px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <!-- Forma -->
  <div class="card fade-in" id="formCard">
    <h1>Secret Hunt</h1>
    <p class="subtitle">Unesi tajni kod da otkljucas nagradu</p>
    <form id="codeForm" autocomplete="off">
      <input
        type="text"
        id="codeInput"
        placeholder="Unesi kod"
        inputmode="numeric"
        autocapitalize="off"
        autocomplete="off"
        spellcheck="false"
        required
      />
      <button type="submit">Posalji</button>
    </form>
  </div>

  <!-- Success -->
  <div class="card success hidden" id="successCard">
    <div class="result-icon">🎉</div>
    <h1>Cestitamo!</h1>
    <p class="subtitle">Pogodili ste kod! Dodjite po svoju nagradu.</p>
  </div>

  <!-- Error -->
  <div class="card error hidden" id="errorCard">
    <div class="result-icon">❌</div>
    <h1>Pogresan kod</h1>
    <p class="subtitle">Probaj ponovo ili pogledaj trag.</p>
    <button type="button" onclick="resetForm()">Probaj ponovo</button>
    <a href="https://anatomijauspeha2026.vercel.app/registracija" class="secondary-btn" id="hintLink">Otvori trag</a>
  </div>

  <script>
    const SECRET_CODE = "102205";

    const formCard    = document.getElementById("formCard");
    const successCard = document.getElementById("successCard");
    const errorCard   = document.getElementById("errorCard");
    const form        = document.getElementById("codeForm");
    const input       = document.getElementById("codeInput");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const entered = input.value.trim();

      if (entered === SECRET_CODE) {
        formCard.classList.add("hidden");
        successCard.classList.remove("hidden");
        successCard.classList.add("fade-in");
      } else {
        formCard.classList.add("hidden");
        errorCard.classList.remove("hidden");
        errorCard.classList.add("fade-in");
      }
    });

    function resetForm() {
      input.value = "";
      errorCard.classList.add("hidden");
      formCard.classList.remove("hidden");
      formCard.classList.add("fade-in");
      input.focus();
    }
  </script>
</body>
</html>
